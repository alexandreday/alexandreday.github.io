<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Database icon -->
  <ellipse cx="200" cy="160" rx="70" ry="20" fill="none" stroke="#00b4d8" stroke-width="2"/>
  <path d="M130 160 v60 a70 20 0 0 0 140 0 v-60" fill="none" stroke="#00b4d8" stroke-width="2"/>
  <ellipse cx="200" cy="190" rx="70" ry="20" fill="none" stroke="#00b4d8" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="200" cy="220" rx="70" ry="20" fill="none" stroke="#00b4d8" stroke-width="2"/>

  <!-- Arrow -->
  <line x1="290" y1="190" x2="370" y2="190" stroke="#48cae4" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="370,183 385,190 370,197" fill="#48cae4"/>

  <!-- Ranking bars -->
  <rect x="400" y="140" width="180" height="16" rx="3" fill="#0077b6" opacity="0.9"/>
  <rect x="400" y="162" width="150" height="16" rx="3" fill="#0096c7" opacity="0.8"/>
  <rect x="400" y="184" width="120" height="16" rx="3" fill="#00b4d8" opacity="0.7"/>
  <rect x="400" y="206" width="90" height="16" rx="3" fill="#48cae4" opacity="0.6"/>
  <rect x="400" y="228" width="60" height="16" rx="3" fill="#90e0ef" opacity="0.5"/>

  <!-- Score labels -->
  <text x="590" y="153" fill="#caf0f8" font-family="monospace" font-size="12">0.94</text>
  <text x="560" y="175" fill="#caf0f8" font-family="monospace" font-size="12">0.82</text>
  <text x="530" y="197" fill="#caf0f8" font-family="monospace" font-size="12">0.71</text>
  <text x="500" y="219" fill="#caf0f8" font-family="monospace" font-size="12">0.58</text>
  <text x="470" y="241" fill="#caf0f8" font-family="monospace" font-size="12">0.43</text>

  <!-- Paper icons on left -->
  <rect x="150" y="260" width="30" height="38" rx="2" fill="none" stroke="#90e0ef" stroke-width="1.5" opacity="0.6"/>
  <line x1="156" y1="270" x2="174" y2="270" stroke="#90e0ef" stroke-width="1" opacity="0.4"/>
  <line x1="156" y1="276" x2="174" y2="276" stroke="#90e0ef" stroke-width="1" opacity="0.4"/>
  <line x1="156" y1="282" x2="170" y2="282" stroke="#90e0ef" stroke-width="1" opacity="0.4"/>

  <rect x="195" y="260" width="30" height="38" rx="2" fill="none" stroke="#90e0ef" stroke-width="1.5" opacity="0.6"/>
  <line x1="201" y1="270" x2="219" y2="270" stroke="#90e0ef" stroke-width="1" opacity="0.4"/>
  <line x1="201" y1="276" x2="219" y2="276" stroke="#90e0ef" stroke-width="1" opacity="0.4"/>
  <line x1="201" y1="282" x2="215" y2="282" stroke="#90e0ef" stroke-width="1" opacity="0.4"/>

  <rect x="240" y="260" width="30" height="38" rx="2" fill="none" stroke="#90e0ef" stroke-width="1.5" opacity="0.6"/>
  <line x1="246" y1="270" x2="264" y2="270" stroke="#90e0ef" stroke-width="1" opacity="0.4"/>
  <line x1="246" y1="276" x2="264" y2="276" stroke="#90e0ef" stroke-width="1" opacity="0.4"/>
  <line x1="246" y1="282" x2="260" y2="282" stroke="#90e0ef" stroke-width="1" opacity="0.4"/>

  <!-- Title -->
  <text x="400" y="340" text-anchor="middle" fill="#caf0f8" font-family="sans-serif" font-size="22" font-weight="bold">Literature Review DB</text>
  <text x="400" y="365" text-anchor="middle" fill="#90e0ef" font-family="sans-serif" font-size="14">Fetch &bull; Score &bull; Rank &bull; Read</text>
</svg>
